
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>20円スロット新台適正導入台数算出ツール</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <style>
    :root {
      --bg: #f5f6f8;
      --amber: #1a56db;
      --amber2: #1445b5;
      --amber-dim: rgba(26,86,219,0.08);
      --amber-border: rgba(26,86,219,0.18);
      --text: #1a202c;
      --text-dim: #718096;
      --warn: #e53e3e;
      --warn-dim: rgba(229,62,62,0.10);
      --good: #276749;
      --good-dim: rgba(39,103,73,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; min-height: 100vh; }
    #root { position: relative; }
    .wrap { max-width: 920px; margin: 0 auto; padding: 36px 24px 48px; }

    .header { margin-bottom: 32px; border-bottom: 1px solid rgba(26,86,219,0.12); padding-bottom: 24px; }
    .header-sub { font-family: 'Rajdhani', sans-serif; font-size: 10px; letter-spacing: 0.4em; color: rgba(26,86,219,0.5); margin-bottom: 10px; }
    .header-title { font-family: 'Rajdhani', sans-serif; font-size: 28px; font-weight: 700; color: var(--text); letter-spacing: 0.05em; }
    .header-title span { color: var(--amber); margin-left: 10px; }

    .section {
      background: #ffffff; border: 1px solid var(--amber-border);
      border-radius: 4px; padding: 24px 28px; margin-bottom: 20px;
      position: relative; overflow: hidden;
    }
    .section::before {
      content: ''; position: absolute; top: 0; left: 0;
      width: 3px; height: 100%;
      background: linear-gradient(180deg, var(--amber), rgba(26,86,219,0.1));
    }
    .section-title {
      font-family: 'Rajdhani', sans-serif; font-size: 12px; font-weight: 700;
      letter-spacing: 0.3em; color: var(--amber); text-transform: uppercase; margin-bottom: 20px;
    }

    /* Area tabs */
    .area-bar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 6px; }
    .area-tab {
      padding: 6px 16px; border-radius: 20px; font-size: 13px; cursor: pointer;
      border: 1px solid rgba(26,86,219,0.3); background: transparent;
      color: var(--amber); font-family: 'Noto Sans JP', sans-serif;
      transition: all 0.15s;
    }
    .area-tab.active { background: var(--amber); color: #fff; font-weight: 700; border-color: var(--amber); }
    .area-tab-del {
      background: transparent; border: none; color: rgba(229,62,62,0.4);
      cursor: pointer; font-size: 12px; margin-left: 2px; padding: 0 2px;
    }
    .area-tab-del:hover { color: var(--warn); }
    .area-add-btn {
      padding: 6px 14px; border-radius: 20px; font-size: 12px; cursor: pointer;
      border: 1px dashed rgba(26,86,219,0.3); background: transparent;
      color: var(--amber); font-family: 'Noto Sans JP', sans-serif;
    }
    .area-name-input {
      background: #f0f4ff; border: 1px solid rgba(26,86,219,0.2);
      border-radius: 4px; color: var(--text); padding: 4px 10px;
      font-size: 13px; width: 120px; outline: none;
      font-family: 'Noto Sans JP', sans-serif;
    }
    .area-name-input:focus { border-color: var(--amber); }
    .save-indicator {
      font-size: 10px; color: #48bb78; margin-left: 8px;
      font-family: 'Rajdhani', sans-serif; letter-spacing: 0.1em;
      opacity: 0; transition: opacity 0.3s;
    }
    .save-indicator.show { opacity: 1; }

    /* Inputs */
    .input-row { display: flex; align-items: center; margin-bottom: 12px; gap: 12px; flex-wrap: wrap; }
    .input-label { color: var(--text-dim); font-size: 12px; width: 200px; flex-shrink: 0; }
    .input-wrap { display: flex; align-items: center; gap: 8px; }
    .num-input {
      background: #f0f4ff; border: 1px solid rgba(26,86,219,0.2);
      border-radius: 2px; color: var(--text);
      padding: 7px 12px; font-size: 16px; width: 140px;
      font-family: 'Rajdhani', sans-serif; font-weight: 600; outline: none;
    }
    .num-input:focus { border-color: var(--amber); background: #e8eeff; }
    .suffix { color: var(--text-dim); font-size: 12px; }
    .text-input {
      background: #f0f4ff; border: 1px solid rgba(26,86,219,0.2);
      border-radius: 2px; color: var(--text);
      padding: 6px 12px; font-size: 14px;
      font-family: 'Noto Sans JP', sans-serif; outline: none;
    }
    .text-input:focus { border-color: var(--amber); background: #e8eeff; }

    .result-box {
      background: #f0f4ff; border: 1px solid rgba(26,86,219,0.15);
      border-radius: 2px; padding: 12px 16px; margin-top: 14px; font-size: 13px;
    }
    .result-label {
      font-family: 'Rajdhani', sans-serif; font-size: 10px; font-weight: 700;
      letter-spacing: 0.2em; color: var(--amber); margin-bottom: 6px;
    }
    .result-row { display: flex; gap: 32px; flex-wrap: wrap; }
    .result-val { font-family: 'Rajdhani', sans-serif; font-size: 20px; color: var(--text); font-weight: 600; }

    .sub-label { font-family: 'Rajdhani', sans-serif; font-size: 10px; letter-spacing: 0.15em; color: var(--text-dim); margin-bottom: 10px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { padding: 8px 12px; font-weight: 400; border-bottom: 1px solid rgba(26,86,219,0.1); color: var(--text-dim); font-size: 11px; letter-spacing: 0.08em; cursor: pointer; }
    th.active { color: var(--amber); font-weight: 700; }
    td { padding: 8px 12px; border-bottom: 1px solid rgba(0,0,0,0.05); }
    td.active-col { background: rgba(26,86,219,0.05); color: var(--text); font-weight: 600; font-family: 'Rajdhani', sans-serif; font-size: 16px; text-align: center; }
    td.inactive-col { color: rgba(0,0,0,0.25); font-family: 'Rajdhani', sans-serif; text-align: center; }
    .hint { font-size: 10px; color: var(--text-dim); margin-top: 6px; }

    .store-row {
      background: #f9fafb; border: 1px solid rgba(0,0,0,0.08);
      border-radius: 3px; padding: 10px 14px; margin-bottom: 8px;
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    }
    .store-name-input {
      background: transparent; border: none;
      border-bottom: 1px solid rgba(26,86,219,0.2);
      color: var(--text); font-size: 13px; width: 90px; outline: none;
      padding: 2px 4px; font-family: 'Noto Sans JP', sans-serif;
    }
    .store-name-input.mystore { color: var(--amber); font-weight: 700; }
    .store-machines-input {
      background: #f0f4ff; border: 1px solid rgba(26,86,219,0.15);
      border-radius: 2px; color: var(--text); padding: 5px 10px;
      font-size: 15px; width: 100px; outline: none;
      font-family: 'Rajdhani', sans-serif; font-weight: 600;
    }
    .store-machines-input:focus { border-color: var(--amber); }
    .store-share { color: var(--text-dim); font-size: 13px; margin-left: 8px; }
    .add-btn {
      margin-top: 8px; background: transparent;
      border: 1px dashed rgba(26,86,219,0.3); border-radius: 2px;
      color: var(--amber); padding: 6px 16px; font-size: 11px;
      cursor: pointer; letter-spacing: 0.1em; font-family: 'Noto Sans JP', sans-serif;
    }
    .remove-btn { margin-left: auto; background: transparent; border: none; color: #aaa; cursor: pointer; font-size: 14px; }
    .remove-btn:hover { color: var(--warn); }
    .area-summary {
      margin-top: 14px; padding: 10px 14px;
      background: #f0f4ff; border-radius: 2px;
      font-size: 12px; color: var(--text-dim); display: flex; gap: 24px;
    }

    .eval-row { display: flex; gap: 10px; margin-bottom: 22px; flex-wrap: wrap; align-items: center; }
    .eval-label { font-size: 11px; color: var(--text-dim); letter-spacing: 0.1em; }
    .eval-btn {
      background: transparent; border: 1px solid rgba(26,86,219,0.3);
      border-radius: 2px; color: var(--amber); padding: 4px 16px;
      font-size: 12px; cursor: pointer; font-family: 'Noto Sans JP', sans-serif;
    }
    .eval-btn.active { background: var(--amber); color: #fff; font-weight: 700; }
    .eval-btn.bad { border-color: rgba(229,62,62,0.4); color: var(--warn); }
    .eval-btn.bad.active { background: var(--warn); color: #fff; }

    .week-cards { display: flex; gap: 10px; margin-bottom: 24px; flex-wrap: wrap; }
    .week-card { flex: 1; min-width: 90px; border-radius: 3px; padding: 14px 12px; text-align: center; }
    .week-card.first { background: #e8eeff; border: 1px solid rgba(26,86,219,0.35); }
    .week-card.other { background: #f9fafb; border: 1px solid rgba(0,0,0,0.08); }
    .week-label { font-size: 10px; margin-bottom: 8px; letter-spacing: 0.08em; }
    .week-num { font-family: 'Rajdhani', sans-serif; font-size: 40px; font-weight: 700; color: #1a202c; line-height: 1; }
    .week-unit { font-size: 12px; color: rgba(0,0,0,0.3); margin-top: 4px; }
    .week-os { font-size: 11px; color: rgba(26,86,219,0.5); margin-top: 6px; font-family: 'Rajdhani', sans-serif; }

    .recommend-box {
      padding: 20px 24px; border-radius: 4px;
      display: flex; align-items: center; gap: 24px; margin-bottom: 20px; flex-wrap: wrap;
    }
    .recommend-box.normal { background: #f0f4ff; border: 1px solid rgba(26,86,219,0.3); }
    .recommend-box.bad { background: #fff5f5; border: 1px solid rgba(229,62,62,0.3); }
    .rec-label { font-size: 10px; letter-spacing: 0.15em; margin-bottom: 6px; }
    .big-num { font-family: 'Rajdhani', sans-serif; font-size: 72px; font-weight: 700; line-height: 1; }
    .rec-unit { font-size: 12px; margin-top: 4px; }
    .badge-warn {
      margin-top: 10px; padding: 5px 12px;
      background: rgba(229,62,62,0.1); border: 1px solid rgba(229,62,62,0.4);
      border-radius: 2px; font-size: 11px; color: var(--warn);
      font-weight: 700; letter-spacing: 0.05em; display: inline-block;
    }
    .rivals-label { font-size: 10px; color: var(--text-dim); margin-bottom: 10px; letter-spacing: 0.08em; }
    .rival-cards { display: flex; flex-wrap: wrap; gap: 8px; }
    .rival-card {
      background: #f9fafb; border: 1px solid rgba(0,0,0,0.08);
      border-radius: 2px; padding: 8px 14px; text-align: center; min-width: 70px;
    }
    .rival-name { font-size: 10px; color: var(--text-dim); margin-bottom: 4px; }
    .rival-num { font-family: 'Rajdhani', sans-serif; font-size: 28px; font-weight: 600; color: #1a202c; }
    .rival-unit { font-size: 9px; color: rgba(0,0,0,0.3); }
    .rec-info {
      padding: 14px 18px; background: rgba(0,0,0,0.05); border-radius: 2px;
      font-size: 13px; color: var(--text-dim); line-height: 2.2;
      font-family: 'Noto Sans JP', sans-serif;
    }
    .rec-info-label { font-size: 11px; color: var(--text-dim); }
    .rec-info-val { font-size: 22px; font-weight: 700; font-family: 'Rajdhani', sans-serif; }

    .suf-box {
      padding: 16px 20px; border-radius: 3px;
      display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
    }
    .suf-label { font-family: 'Noto Sans JP', sans-serif; font-size: 11px; color: var(--text-dim); margin-bottom: 6px; letter-spacing: 0.05em; }
    .suf-num { font-family: 'Rajdhani', sans-serif; font-size: 52px; font-weight: 700; line-height: 1; }
    .suf-msg { font-size: 12px; }
    .planned-wrap { display: flex; align-items: center; gap: 6px; margin-left: auto; }
    .planned-check { width: 14px; height: 14px; accent-color: var(--amber); cursor: pointer; }
    .planned-label { font-size: 11px; color: var(--text-dim); }
    .planned-input {
      background: rgba(26,86,219,0.08); border: 1px solid rgba(26,86,219,0.25);
      border-radius: 2px; color: var(--text); padding: 3px 8px;
      font-size: 13px; width: 70px; outline: none;
      font-family: 'Rajdhani', sans-serif; font-weight: 600;
    }
    .planned-input:focus { border-color: var(--amber); }
    .planned-suffix { font-size: 11px; color: var(--text-dim); }
    .planned-confirmed { font-size: 10px; color: var(--amber); background: rgba(26,86,219,0.1); padding: 2px 6px; border-radius: 10px; margin-left: 4px; }
    .footer { text-align: center; font-size: 10px; color: rgba(26,86,219,0.3); margin-top: 12px; letter-spacing: 0.08em; font-family: 'Rajdhani', sans-serif; }
    .reset-btn { background: rgba(229,62,62,0.06); color: #dc2626; border: 1px solid rgba(220,38,38,0.3); border-radius: 2px; padding: 7px 18px; font-size: 12px; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; }
    .reset-btn:hover { background: rgba(220,38,38,0.12); }
  </style>
</head>
<body>
<div id="root"></div>
<script>
const { useState, useEffect, useCallback, createElement: h } = React;

const STORAGE_KEY = 'slot_tool_v1';

const DECAY_RATIOS = {
  特上: [1.000, 0.970, 0.940, 0.920, 0.900],
  良:   [1.000, 0.930, 0.840, 0.760, 0.730],
  並:   [1.000, 0.870, 0.740, 0.640, 0.550],
  悪:   [1.000, 0.780, 0.620, 0.500, 0.350],
};
const EVALUATIONS = ["特上", "良", "並", "悪"];
const WEEKS = ["初週", "2週目", "3週目", "4週目", "5週目"];

const DEFAULT_AREA = {
  name: "浜線エリア",
  areaPeakCustomers: "2300",
  stores: [
    { name: "自店",  machines: "491" },
    { name: "競合A", machines: "717" },
    { name: "競合B", machines: "461" },
    { name: "競合C", machines: "410" },
    { name: "競合D", machines: "351" },
    { name: "競合E", machines: "259" },
    { name: "競合F", machines: "370" },
    { name: "競合G", machines: "251" },
  ]
};

const DEFAULT_GLOBAL = {
  prefMachines: "16926",
  peakOccupancy: "38.7",
  prefRatio: "1.6",
};

function n(v) { return parseFloat(v) || 0; }
function fmt(v, d) { return n(v).toFixed(d === undefined ? 2 : d); }

function loadData() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return null;
}

function saveData(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
}

function App() {
  // Load saved data first, use as initial state
  var saved = (function() { try { var r = localStorage.getItem(STORAGE_KEY); return r ? JSON.parse(r) : {}; } catch(e) { return {}; } })();

  // Global settings
  const [prefMachines,  setPrefMachines]  = useState(saved.prefMachines  || DEFAULT_GLOBAL.prefMachines);
  const [peakOccupancy, setPeakOccupancy] = useState(saved.peakOccupancy || DEFAULT_GLOBAL.peakOccupancy);
  const [prefRatio,     setPrefRatio]     = useState(saved.prefRatio     || DEFAULT_GLOBAL.prefRatio);

  // Machine
  const [machineName,   setMachineName]   = useState(saved.machineName   || "");
  const [nationalSales, setNationalSales] = useState(saved.nationalSales || "10000");
  const [selectedEval,  setSelectedEval]  = useState(saved.selectedEval  || "良");

  // Areas
  const [areas,         setAreas]         = useState((saved.areas && saved.areas.length > 0) ? saved.areas : [DEFAULT_AREA]);
  const [currentArea,   setCurrentArea]   = useState(saved.currentArea || 0);
  const [myPlannedUnits, setMyPlannedUnits] = useState(saved.myPlannedUnits || '');
  const [saveFlash,     setSaveFlash]     = useState(false);
  const [mounted,       setMounted]       = useState(false);

  useEffect(function() { setMounted(true); }, []);

  // Auto-save only after mount to avoid overwriting saved data on first render
  useEffect(function() {
    if (!mounted) return;
    saveData({ prefMachines, peakOccupancy, prefRatio, machineName, nationalSales, selectedEval, areas, currentArea, myPlannedUnits });
    setSaveFlash(true);
    var t = setTimeout(function() { setSaveFlash(false); }, 1500);
    return function() { clearTimeout(t); };
  }, [mounted, prefMachines, peakOccupancy, prefRatio, machineName, nationalSales, selectedEval, areas]);

  var area = areas[currentArea] || areas[0];

  function updateArea(field, val) {
    setAreas(function(prev) {
      return prev.map(function(a, i) {
        return i === currentArea ? Object.assign({}, a, { [field]: val }) : a;
      });
    });
  }

  function updateStore(si, field, val) {
    var newStores = area.stores.map(function(s, idx) {
      return idx === si ? Object.assign({}, s, { [field]: val }) : s;
    });
    updateArea('stores', newStores);
  }

  function addStore() {
    var newStores = area.stores.concat([{ name: "競合" + String.fromCharCode(64 + area.stores.length), machines: "200" }]);
    updateArea('stores', newStores);
  }

  function removeStore(si) {
    if (area.stores.length > 1) {
      updateArea('stores', area.stores.filter(function(_, idx) { return idx !== si; }));
    }
  }

  function addArea() {
    var newArea = Object.assign({}, DEFAULT_AREA, { name: "エリア" + (areas.length + 1), stores: [{ name: "自店", machines: "300" }] });
    setAreas(function(prev) { return prev.concat([newArea]); });
    setCurrentArea(areas.length);
  }

  function removeArea(i) {
    if (areas.length <= 1) return;
    setAreas(function(prev) { return prev.filter(function(_, idx) { return idx !== i; }); });
    setCurrentArea(Math.max(0, i - 1));
  }

  // Calculations
  const maxPlayers   = n(prefMachines) * (n(peakOccupancy) / 100);
  const prefSales    = n(nationalSales) * (n(prefRatio) / 100);
  const baseOutshare = maxPlayers > 0 ? (prefSales / maxPlayers) * 100 : 0;

  const outshareByEval = {};
  EVALUATIONS.forEach(function(ev) {
    outshareByEval[ev] = DECAY_RATIOS[ev].map(function(r) { return baseOutshare * r; });
  });

  const totalAreaMachines = area.stores.reduce(function(s, st) { return s + n(st.machines); }, 0);
  const myShare = totalAreaMachines > 0 ? n(area.stores[0].machines) / totalAreaMachines : 0;
  const weeklyAreaCustomers = outshareByEval[selectedEval].map(function(os) { return n(area.areaPeakCustomers) * (os / 100); });

  // 推奨台数：従来通りシェア按分（変更なし）
  const myWeeklyCount = weeklyAreaCustomers.map(function(c) { return c * myShare; });
  const totalAreaCount = weeklyAreaCustomers.slice();

  // 充足率：確定台数がある店舗はその台数、ない店舗はシェア按分で計算（5週目ベース）
  var totalSupply5w = 0;
  var myPlannedConfirmed = n(myPlannedUnits) > 0;
  // 自店
  if (myPlannedConfirmed) {
    totalSupply5w += n(myPlannedUnits);
  } else {
    totalSupply5w += weeklyAreaCustomers[4] * myShare;
  }
  // 競合店
  area.stores.slice(1).forEach(function(st) {
    if (st.hasPlanned && n(st.plannedUnits) > 0) {
      totalSupply5w += n(st.plannedUnits);
    } else {
      var share = totalAreaMachines > 0 ? n(st.machines) / totalAreaMachines : 0;
      totalSupply5w += weeklyAreaCustomers[4] * share;
    }
  });
  var confirmedCount = area.stores.slice(1).filter(function(st) { return st.hasPlanned && n(st.plannedUnits) > 0; }).length;
  if (myPlannedConfirmed) confirmedCount++;
  const sufficiencyRate = weeklyAreaCustomers[4] > 0 ? (totalSupply5w / weeklyAreaCustomers[4]) * 100 : 0;

  // 充足率3段階：～100%青、100～120%緑、120%超赤
  var sufColor  = sufficiencyRate < 100 ? '#1d4ed8'
                : sufficiencyRate <= 120 ? '#15803d'
                : sufficiencyRate <= 140 ? '#d97706'
                : '#dc2626';
  var sufBg     = sufficiencyRate < 100 ? 'rgba(29,78,216,0.08)'
                : sufficiencyRate <= 120 ? 'rgba(21,128,61,0.08)'
                : sufficiencyRate <= 140 ? 'rgba(217,119,6,0.08)'
                : 'rgba(220,38,38,0.08)';
  var sufBorder = sufficiencyRate < 100 ? 'rgba(29,78,216,0.35)'
                : sufficiencyRate <= 120 ? 'rgba(21,128,61,0.35)'
                : sufficiencyRate <= 140 ? 'rgba(217,119,6,0.35)'
                : 'rgba(220,38,38,0.35)';
  var sufMsg    = sufficiencyRate < 100 ? '◎ 積極導入 — 需要に対して供給が不足しています'
                : sufficiencyRate <= 120 ? '✓ 余地あり — 導入余地があります'
                : sufficiencyRate <= 140 ? '－ 適正 — エリア需要と供給のバランスが取れています'
                : '⚠ 供給過多 — エリアが飽和傾向です';
  var sufNote   = confirmedCount > 0 ? '（' + confirmedCount + '店確定反映・5週目ベース）' : '（シェア按分・5週目ベース）';

  const isBad  = selectedEval === "悪";

  function handleReset() {
    if (window.confirm('初期データに戻します。\n現在の入力内容はすべて消えます。\nよろしいですか？')) {
      try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
      setPrefMachines("16926");
      setPeakOccupancy("38.7");
      setPrefRatio("1.6");
      setMachineName("");
      setNationalSales("10000");
      setSelectedEval("良");
      setAreas([DEFAULT_AREA]);
      setCurrentArea(0);
      setMyPlannedUnits("");
      alert('初期データに戻しました。');
    }
  }

  function InputRow(label, value, setter, suffix) {
    return h('div', { className: 'input-row' },
      h('label', { className: 'input-label' }, label),
      h('div', { className: 'input-wrap' },
        h('input', {
          className: 'num-input', type: 'text', inputMode: 'decimal',
          value: value,
          onChange: function(e) { setter(e.target.value); },
          onFocus: function(e) { e.target.select(); },
        }),
        suffix ? h('span', { className: 'suffix' }, suffix) : null
      )
    );
  }

  return h('div', { className: 'wrap' },

    // Header
    h('div', { className: 'header' },
      h('div', { className: 'header-sub' }, 'SLOT UNIT ANALYSIS TOOL / 20円スロット'),
      h('div', { style: { display: 'flex', alignItems: 'center', gap: 12 } },
        h('h1', { className: 'header-title' }, '20円スロット', h('span', null, '新台適正導入台数算出ツール')),
        h('span', { className: 'save-indicator' + (saveFlash ? ' show' : '') }, '✓ 保存済み')
      )
    ),

    // 01 県内データ
    h('div', { className: 'section' },
      h('div', { className: 'section-title' }, '01 / 県内データ'),
      InputRow('20円設置台数', prefMachines, setPrefMachines, '台'),
      InputRow('ピーク稼働率', peakOccupancy, setPeakOccupancy, '%'),
      InputRow('県内販売按分率', prefRatio, setPrefRatio, '%'),
      h('div', { className: 'result-box' },
        h('div', { className: 'result-label' }, 'CALCULATED'),
        h('span', null, '県内最大遊技人数：'),
        h('span', { className: 'result-val' }, Math.round(maxPlayers).toLocaleString() + ' 人')
      )
    ),

    // 02 機種データ
    h('div', { className: 'section' },
      h('div', { className: 'section-title' }, '02 / 機種データ'),
      h('div', { className: 'input-row' },
        h('label', { className: 'input-label' }, '機種名　／　全国販売台数'),
        h('div', { className: 'input-wrap' },
          h('input', {
            type: 'text', className: 'text-input',
            value: machineName,
            onChange: function(e) { setMachineName(e.target.value); },
            placeholder: '機種名を入力',
            style: { width: 200, marginRight: 8 }
          }),
          h('input', {
            className: 'num-input', type: 'text', inputMode: 'decimal',
            value: nationalSales,
            onChange: function(e) { setNationalSales(e.target.value); },
            onFocus: function(e) { e.target.select(); },
            style: { width: 110 }
          }),
          h('span', { className: 'suffix' }, '台')
        )
      ),
      h('div', { className: 'result-box' },
        h('div', { className: 'result-label' }, 'CALCULATED'),
        h('div', { className: 'result-row' },
          h('span', null, '県内販売台数：', h('span', { className: 'result-val' }, Math.round(prefSales).toLocaleString() + ' 台')),
          h('span', null, '基準アウトシェア：', h('span', { className: 'result-val' }, fmt(baseOutshare) + ' %'))
        )
      ),
      h('div', { className: 'sub-label', style: { marginTop: 20 } }, '評価別アウトシェア推移（%）'),
      h('div', { style: { overflowX: 'auto' } },
        h('table', null,
          h('thead', null,
            h('tr', null,
              h('th', { style: { textAlign: 'left' } }, '週'),
              EVALUATIONS.map(function(ev) {
                return h('th', { key: ev, className: selectedEval === ev ? 'active' : '', style: { textAlign: 'center' }, onClick: function() { setSelectedEval(ev); } }, ev + (selectedEval === ev ? ' ▲' : ''));
              })
            )
          ),
          h('tbody', null,
            WEEKS.map(function(week, wi) {
              return h('tr', { key: week, style: { background: wi % 2 === 0 ? 'rgba(26,86,219,0.02)' : 'transparent' } },
                h('td', { style: { color: 'var(--text-dim)', fontSize: 12 } }, week),
                EVALUATIONS.map(function(ev) {
                  return h('td', { key: ev, className: selectedEval === ev ? 'active-col' : 'inactive-col' }, fmt(outshareByEval[ev][wi]) + '%');
                })
              );
            })
          )
        )
      ),
      h('div', { className: 'hint' }, '※ 評価名をクリックして選択')
    ),

    // 03 エリアデータ
    h('div', { className: 'section' },
      h('div', { className: 'section-title' }, '03 / エリアデータ'),

      // Area tabs
      h('div', { style: { marginBottom: 20 } },
        h('div', { style: { fontSize: 10, color: 'var(--text-dim)', marginBottom: 8, letterSpacing: '0.1em' } }, 'エリア選択'),
        h('div', { className: 'area-bar' },
          areas.map(function(a, i) {
            return h('div', { key: i, style: { display: 'flex', alignItems: 'center', gap: 2 } },
              h('button', {
                className: 'area-tab' + (currentArea === i ? ' active' : ''),
                onClick: function() { setCurrentArea(i); }
              }, a.name),
              areas.length > 1
                ? h('button', { className: 'area-tab-del', onClick: function() { removeArea(i); }, title: '削除' }, '✕')
                : null
            );
          }),
          h('button', { className: 'area-add-btn', onClick: addArea }, '＋ エリア追加')
        )
      ),

      // Area name
      h('div', { className: 'input-row' },
        h('label', { className: 'input-label' }, 'エリア名'),
        h('input', {
          type: 'text', className: 'area-name-input',
          value: area.name,
          onChange: function(e) { updateArea('name', e.target.value); },
        })
      ),

      InputRow('エリアピーク客数', area.areaPeakCustomers, function(v) { updateArea('areaPeakCustomers', v); }, '人'),

      h('div', { className: 'sub-label', style: { margin: '16px 0 10px' } }, 'STORE LIST（1行目 ＝ 自店）'),
      area.stores.map(function(store, i) {
        var isMyStore = i === 0;
        return h('div', { key: i, className: 'store-row' },
          h('input', {
            type: 'text', value: store.name,
            onChange: function(e) { updateStore(i, 'name', e.target.value); },
            className: 'store-name-input' + (isMyStore ? ' mystore' : ''),
          }),
          h('input', {
            type: 'text', inputMode: 'numeric', value: store.machines,
            onChange: function(e) { updateStore(i, 'machines', e.target.value); },
            onFocus: function(e) { e.target.select(); },
            className: 'store-machines-input',
          }),
          h('span', { className: 'suffix' }, '台'),
          h('span', { className: 'store-share' }, 'シェア ' + (totalAreaMachines > 0 ? fmt(n(store.machines) / totalAreaMachines * 100) : '0.00') + '%'),
          !isMyStore ? h('div', { className: 'planned-wrap' },
            h('input', {
              type: 'checkbox',
              className: 'planned-check',
              checked: !!store.hasPlanned,
              onChange: function(e) { updateStore(i, 'hasPlanned', e.target.checked); }
            }),
            h('span', { className: 'planned-label' }, '導入予定'),
            store.hasPlanned ? h('input', {
              type: 'text', inputMode: 'numeric',
              className: 'planned-input',
              value: store.plannedUnits || '',
              placeholder: '0',
              onChange: function(e) { updateStore(i, 'plannedUnits', e.target.value); },
              onFocus: function(e) { e.target.select(); },
            }) : null,
            store.hasPlanned ? h('span', { className: 'planned-suffix' }, '台') : null,
            store.hasPlanned && n(store.plannedUnits) > 0 ? h('span', { className: 'planned-confirmed' }, '確定') : null
          ) : null,
          (area.stores.length > 1 && i !== 0)
            ? h('button', { onClick: function() { removeStore(i); }, className: 'remove-btn' }, '✕')
            : null
        );
      }),
      h('button', { onClick: addStore, className: 'add-btn' }, '＋ 店舗を追加'),
      h('div', { className: 'area-summary' },
        h('span', null, 'エリア合計：', h('strong', { style: { color: 'var(--text)', fontFamily: 'Rajdhani, sans-serif' } }, totalAreaMachines.toLocaleString() + ' 台')),
        h('span', null, '自店シェア：', h('strong', { style: { color: 'var(--amber)', fontFamily: 'Rajdhani, sans-serif' } }, fmt(myShare * 100) + ' %'))
      )
    ),

    // 04 算出結果
    h('div', { className: 'section' },
      h('div', { className: 'section-title' }, '04 / 算出結果'),

      h('div', { className: 'eval-row' },
        h('span', { className: 'eval-label' }, 'EVALUATION :'),
        EVALUATIONS.map(function(ev) {
          return h('button', { key: ev, className: 'eval-btn' + (selectedEval === ev ? ' active' : '') + (ev === '悪' ? ' bad' : ''), onClick: function() { setSelectedEval(ev); } }, ev);
        })
      ),

      h('div', { className: 'sub-label' }, '自店　WEEKLY UNIT COUNT'),
      h('div', { className: 'week-cards' },
        WEEKS.map(function(week, wi) {
          return h('div', { key: week, className: 'week-card ' + (wi === 0 ? 'first' : 'other') },
            h('div', { className: 'week-label', style: { color: wi === 0 ? 'var(--amber)' : 'var(--text-dim)' } }, week),
            h('div', { className: 'week-num' }, Math.round(myWeeklyCount[wi])),
            h('div', { className: 'week-unit' }, '台'),
            h('div', { className: 'week-os' }, 'OS ' + fmt(outshareByEval[selectedEval][wi]) + '%')
          );
        })
      ),

      h('div', { className: 'sub-label' }, '全店舗　AREA UNIT TABLE（' + selectedEval + '）'),
      h('div', { style: { overflowX: 'auto', marginBottom: 24 } },
        h('table', null,
          h('thead', null,
            h('tr', null,
              h('th', { style: { textAlign: 'left' } }, '店舗'),
              h('th', { style: { textAlign: 'right' } }, '台数'),
              h('th', { style: { textAlign: 'right' } }, 'シェア'),
              WEEKS.map(function(w) { return h('th', { key: w, style: { textAlign: 'right' } }, w); })
            )
          ),
          h('tbody', null,
            area.stores.map(function(store, i) {
              var isMyStore = i === 0;
              var share = totalAreaMachines > 0 ? n(store.machines) / totalAreaMachines : 0;
              var wc = weeklyAreaCustomers.map(function(c) { return Math.round(c * share); });
              return h('tr', { key: i, style: { background: isMyStore ? 'rgba(26,86,219,0.04)' : i % 2 === 0 ? 'rgba(0,0,0,0.01)' : 'transparent' } },
                h('td', { style: { color: isMyStore ? 'var(--amber)' : 'var(--text)', fontWeight: isMyStore ? 700 : 400 } }, store.name),
                h('td', { style: { textAlign: 'right', color: 'var(--text-dim)', fontFamily: 'Rajdhani, sans-serif' } }, n(store.machines).toLocaleString()),
                h('td', { style: { textAlign: 'right', color: 'var(--text-dim)', fontFamily: 'Rajdhani, sans-serif' } }, fmt(share * 100) + '%'),
                wc.map(function(c, wi) {
                  return h('td', { key: wi, style: { textAlign: 'right', fontFamily: 'Rajdhani, sans-serif', color: isMyStore ? 'var(--text)' : 'rgba(0,0,0,0.4)', fontWeight: isMyStore ? 600 : 400 } }, c + '台');
                })
              );
            })
          ),
          h('tfoot', null,
            h('tr', { style: { borderTop: '1px solid rgba(26,86,219,0.1)' } },
              h('td', { colSpan: 3, style: { color: 'var(--text-dim)', fontSize: 11 } }, 'エリア合計'),
              totalAreaCount.map(function(c, wi) {
                return h('td', { key: wi, style: { textAlign: 'right', color: 'rgba(0,0,0,0.3)', fontSize: 11, fontFamily: 'Rajdhani, sans-serif' } }, Math.round(c) + '台');
              })
            )
          )
        )
      ),

      h('div', { className: 'sub-label' }, '導入推奨台数　RECOMMENDED UNITS（5週目ベース）'),
      h('div', { className: 'recommend-box ' + (isBad ? 'bad' : 'normal') },
        h('div', { style: { textAlign: 'center' } },
          h('div', { className: 'rec-label', style: { color: isBad ? 'var(--warn)' : 'var(--amber)' } }, '自店 導入推奨台数'),
          h('div', { className: 'big-num', style: { color: isBad ? 'var(--warn)' : 'var(--amber)' } }, Math.round(myWeeklyCount[4])),
          h('div', { className: 'rec-unit', style: { color: isBad ? 'var(--warn)' : 'var(--amber2)' } }, '台'),
          isBad ? h('div', { className: 'badge-warn' }, '⚠ 悪評価のため導入非推奨') : null
        ),
        h('div', { style: { flex: 1, minWidth: 200 } },
          h('div', { className: 'rivals-label' }, '競合店 導入推奨台数'),
          h('div', { className: 'rival-cards' },
            area.stores.slice(1).map(function(store, i) {
              var share = totalAreaMachines > 0 ? n(store.machines) / totalAreaMachines : 0;
              return h('div', { key: i, className: 'rival-card' },
                h('div', { className: 'rival-name' }, store.name),
                h('div', { className: 'rival-num' }, Math.round(weeklyAreaCustomers[4] * share)),
                h('div', { className: 'rival-unit' }, '台')
              );
            })
          )
        ),
        h('div', { className: 'rec-info' },
          h('div', null, h('span', { className: 'rec-info-label' }, '評価　'), h('span', { className: 'rec-info-val', style: { color: isBad ? 'var(--warn)' : 'var(--amber)' } }, selectedEval)),
          h('div', null, h('span', { className: 'rec-info-label' }, '5週目アウトシェア　'), h('span', { className: 'rec-info-val', style: { color: 'var(--text)' } }, fmt(outshareByEval[selectedEval][4]) + '%')),
          h('div', null, h('span', { className: 'rec-info-label' }, 'エリア予測客数　'), h('span', { className: 'rec-info-val', style: { color: 'var(--text)' } }, fmt(weeklyAreaCustomers[4]) + '人'))
        )
      ),

      h('div', { style: { display: 'flex', alignItems: 'center', gap: 12, margin: '-8px 0 20px', padding: '14px 20px', background: 'rgba(26,86,219,0.05)', border: '1px solid rgba(26,86,219,0.15)', borderRadius: 4 } },
        h('span', { style: { fontSize: 12, color: 'var(--text-dim)', minWidth: 140 } }, '自店 導入予定台数'),
        h('input', {
          type: 'text', inputMode: 'numeric',
          className: 'num-input',
          value: myPlannedUnits,
          placeholder: '未定',
          onChange: function(e) { setMyPlannedUnits(e.target.value); },
          onFocus: function(e) { e.target.select(); },
          style: { width: 110 }
        }),
        h('span', { className: 'suffix' }, '台'),
        n(myPlannedUnits) > 0
          ? h('span', { style: { fontSize: 11, color: 'var(--amber)', background: 'rgba(26,86,219,0.1)', padding: '2px 8px', borderRadius: 10 } }, '確定 → 充足率に反映')
          : h('span', { style: { fontSize: 11, color: 'var(--text-dim)' } }, '入力すると充足率に反映されます')
      ),

      h('div', {
        className: 'suf-box',
        style: { background: sufBg, border: '1px solid ' + sufBorder }
      },
        h('div', null,
          h('div', { className: 'suf-label' }, 'エリア充足率 ' + sufNote),
          h('div', { className: 'suf-num', style: { color: sufColor } }, fmt(sufficiencyRate) + '%')
        ),
        h('div', { style: { borderLeft: '1px solid rgba(0,0,0,0.08)', paddingLeft: 20 } },
          h('div', { className: 'suf-label' }, 'エリア導入台数合計（5週目）'),
          h('div', { className: 'suf-num', style: { color: 'var(--text)', fontSize: 28 } }, Math.round(totalSupply5w) + ' 台')
        ),
        h('div', { className: 'suf-msg', style: { color: sufColor } }, sufMsg)
      )
    ),

    h('div', { style: { textAlign: 'center', marginBottom: 12 } },
      h('button', { className: 'reset-btn', onClick: handleReset }, '↺ 初期データに戻す')
    ),
    h('div', { className: 'footer' }, 'OUTSHARE = PREF SALES ÷ PREF MAX PLAYERS　／　UNIT = AREA PEAK × OUTSHARE × STORE SHARE')
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
