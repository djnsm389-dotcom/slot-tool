<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>20円スロット新台適正導入台数算出ツール</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <style>
    :root {
      --bg: #f5f6f8;
      --amber: #1a56db;
      --amber2: #1445b5;
      --amber-dim: rgba(26,86,219,0.08);
      --amber-border: rgba(26,86,219,0.18);
      --text: #1a202c;
      --text-dim: #718096;
      --warn: #e53e3e;
      --warn-dim: rgba(229,62,62,0.10);
      --good: #276749;
      --good-dim: rgba(39,103,73,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; min-height: 100vh; }
    .grid-bg { display: none; }
    #root { position: relative; z-index: 1; }
    .wrap { max-width: 920px; margin: 0 auto; padding: 36px 24px 48px; }

    /* Header */
    .header { margin-bottom: 40px; border-bottom: 1px solid rgba(26,86,219,0.12); padding-bottom: 24px; }
    .header-sub { font-family: 'Rajdhani', sans-serif; font-size: 10px; letter-spacing: 0.4em; color: rgba(26,86,219,0.5); margin-bottom: 10px; }
    .header-title { font-family: 'Rajdhani', sans-serif; font-size: 28px; font-weight: 700; color: var(--text); letter-spacing: 0.05em; }
    .header-title span { color: var(--amber); margin-left: 10px; }

    /* Section */
    .section {
      background: #ffffff;
      border: 1px solid var(--amber-border);
      border-radius: 4px; padding: 24px 28px; margin-bottom: 20px;
      position: relative; overflow: hidden;
    }
    .section::before {
      content: ''; position: absolute; top: 0; left: 0;
      width: 3px; height: 100%;
      background: linear-gradient(180deg, var(--amber), rgba(26,86,219,0.1));
    }
    .section-title {
      font-family: 'Rajdhani', sans-serif; font-size: 12px; font-weight: 700;
      letter-spacing: 0.3em; color: var(--amber); text-transform: uppercase; margin-bottom: 20px;
    }

    /* Inputs */
    .input-row { display: flex; align-items: center; margin-bottom: 12px; gap: 12px; flex-wrap: wrap; }
    .input-label { color: var(--text-dim); font-size: 12px; width: 200px; flex-shrink: 0; }
    .input-wrap { display: flex; align-items: center; gap: 8px; }
    .num-input {
      background: #f0f4ff;
      border: 1px solid rgba(26,86,219,0.2);
      border-radius: 2px; color: var(--text);
      padding: 6px 12px; font-size: 14px; width: 130px;
      font-family: 'Rajdhani', sans-serif; font-weight: 600;
      outline: none;
    }
    .num-input:focus { border-color: var(--amber); background: #e8eeff; }
    .suffix { color: var(--text-dim); font-size: 12px; }

    /* Result box */
    .result-box {
      background: #f0f4ff; border: 1px solid rgba(26,86,219,0.15);
      border-radius: 2px; padding: 12px 16px; margin-top: 14px; font-size: 13px;
    }
    .result-label {
      font-family: 'Rajdhani', sans-serif; font-size: 10px; font-weight: 700;
      letter-spacing: 0.2em; color: var(--amber); margin-bottom: 6px;
    }
    .result-row { display: flex; gap: 32px; flex-wrap: wrap; }
    .result-val { font-family: 'Rajdhani', sans-serif; font-size: 15px; color: var(--text); font-weight: 600; }

    /* Outshare table */
    .sub-label { font-family: 'Rajdhani', sans-serif; font-size: 10px; letter-spacing: 0.15em; color: var(--text-dim); margin-bottom: 10px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { padding: 8px 12px; font-weight: 400; border-bottom: 1px solid rgba(26,86,219,0.1); color: var(--text-dim); font-size: 11px; letter-spacing: 0.08em; cursor: pointer; }
    th.active { color: var(--amber); font-weight: 700; }
    td { padding: 8px 12px; border-bottom: 1px solid rgba(0,0,0,0.05); }
    td.active-col { background: rgba(26,86,219,0.05); color: var(--text); font-weight: 600; font-family: 'Rajdhani', sans-serif; font-size: 14px; }
    td.inactive-col { color: rgba(0,0,0,0.25); font-family: 'Rajdhani', sans-serif; }
    .hint { font-size: 10px; color: var(--text-dim); margin-top: 6px; }

    /* Store list */
    .store-row {
      background: #f9fafb; border: 1px solid rgba(0,0,0,0.08);
      border-radius: 3px; padding: 10px 14px; margin-bottom: 8px;
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    }
    .store-name-input {
      background: transparent; border: none;
      border-bottom: 1px solid rgba(26,86,219,0.2);
      color: var(--text); font-size: 13px; width: 90px; outline: none;
      padding: 2px 4px; font-family: 'Noto Sans JP', sans-serif;
    }
    .store-name-input.mystore { color: var(--amber); font-weight: 700; }
    .store-machines-input {
      background: #f0f4ff; border: 1px solid rgba(26,86,219,0.2);
      border-radius: 2px; color: var(--text); padding: 4px 10px;
      font-size: 13px; width: 90px; outline: none;
      font-family: 'Rajdhani', sans-serif; font-weight: 600;
    }
    .store-machines-input:focus { border-color: var(--amber); }
    .store-share { color: var(--text-dim); font-size: 11px; margin-left: 8px; }
    .add-btn {
      margin-top: 8px; background: transparent;
      border: 1px dashed rgba(26,86,219,0.3); border-radius: 2px;
      color: var(--amber); padding: 6px 16px; font-size: 11px;
      cursor: pointer; letter-spacing: 0.1em; font-family: 'Noto Sans JP', sans-serif;
    }
    .remove-btn {
      margin-left: auto; background: transparent; border: none;
      color: rgba(0,0,0,0.25); cursor: pointer; font-size: 14px;
    }
    .remove-btn:hover { color: var(--warn); }
    .remove-btn { color: #aaa; }
    .area-summary {
      margin-top: 14px; padding: 10px 14px;
      background: #f0f4ff; border-radius: 2px;
      font-size: 12px; color: var(--text-dim); display: flex; gap: 24px;
    }

    /* Eval buttons */
    .eval-row { display: flex; gap: 10px; margin-bottom: 22px; flex-wrap: wrap; align-items: center; }
    .eval-label { font-size: 11px; color: var(--text-dim); letter-spacing: 0.1em; }
    .eval-btn {
      background: transparent; border: 1px solid rgba(26,86,219,0.3);
      border-radius: 2px; color: var(--amber); padding: 4px 16px;
      font-size: 12px; cursor: pointer; font-family: 'Noto Sans JP', sans-serif;
    }
    .eval-btn.active { background: var(--amber); color: #060d1a; font-weight: 700; }
    .eval-btn.bad { border-color: rgba(255,107,53,0.4); color: var(--warn); }
    .eval-btn.bad.active { background: var(--warn); color: #fff; }

    /* Week cards */
    .week-cards { display: flex; gap: 10px; margin-bottom: 24px; flex-wrap: wrap; }
    .week-card { flex: 1; min-width: 90px; border-radius: 3px; padding: 14px 12px; text-align: center; }
    .week-card.first { background: #e8eeff; border: 1px solid rgba(26,86,219,0.35); }
    .week-card.other { background: #f9fafb; border: 1px solid rgba(0,0,0,0.08); }
    .week-label { font-size: 10px; margin-bottom: 8px; letter-spacing: 0.08em; }
    .week-num { font-family: 'Rajdhani', sans-serif; font-size: 30px; font-weight: 700; color: #1a202c; line-height: 1; }
    .week-unit { font-size: 10px; color: rgba(0,0,0,0.3); margin-top: 4px; }
    .week-os { font-size: 9px; color: rgba(26,86,219,0.5); margin-top: 6px; font-family: 'Rajdhani', sans-serif; }

    /* Recommend box */
    .recommend-box {
      padding: 20px 24px; border-radius: 4px;
      display: flex; align-items: center; gap: 24px; margin-bottom: 20px; flex-wrap: wrap;
    }
    .recommend-box.normal { background: rgba(245,200,66,0.06); border: 1px solid rgba(26,86,219,0.3); }
    .recommend-box.bad { background: #fff5f5; border: 1px solid rgba(229,62,62,0.3); }
    .rec-label { font-size: 10px; letter-spacing: 0.15em; margin-bottom: 6px; }
    .big-num { font-family: 'Rajdhani', sans-serif; font-size: 56px; font-weight: 700; line-height: 1; }
    .rec-unit { font-size: 12px; margin-top: 4px; }
    .badge-warn {
      margin-top: 10px; padding: 5px 12px;
      background: rgba(255,107,53,0.15); border: 1px solid rgba(255,107,53,0.4);
      border-radius: 2px; font-size: 11px; color: var(--warn);
      font-weight: 700; letter-spacing: 0.05em; display: inline-block;
    }
    .rivals-label { font-size: 10px; color: var(--text-dim); margin-bottom: 10px; letter-spacing: 0.08em; }
    .rival-cards { display: flex; flex-wrap: wrap; gap: 8px; }
    .rival-card {
      background: #f9fafb; border: 1px solid rgba(0,0,0,0.08);
      border-radius: 2px; padding: 8px 14px; text-align: center; min-width: 70px;
    }
    .rival-name { font-size: 10px; color: var(--text-dim); margin-bottom: 4px; }
    .rival-num { font-family: 'Rajdhani', sans-serif; font-size: 22px; font-weight: 600; color: #1a202c; }
    .rival-unit { font-size: 9px; color: rgba(0,0,0,0.3); }
    .rec-info {
      padding: 14px 18px; background: rgba(0,0,0,0.05); border-radius: 2px;
      font-size: 13px; color: var(--text-dim); line-height: 2.2;
      font-family: 'Noto Sans JP', sans-serif;
    }
    .rec-info-label { font-size: 11px; color: var(--text-dim); }
    .rec-info-val { font-size: 16px; font-weight: 700; font-family: 'Rajdhani', sans-serif; }

    /* Sufficiency */
    .suf-box {
      padding: 16px 20px; border-radius: 3px;
      display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
    }
    .suf-label { font-family: 'Rajdhani', sans-serif; font-size: 10px; color: var(--text-dim); margin-bottom: 4px; letter-spacing: 0.1em; }
    .suf-num { font-family: 'Rajdhani', sans-serif; font-size: 34px; font-weight: 700; }
    .suf-msg { font-size: 12px; }

    /* Footer */
    .footer { text-align: center; font-size: 10px; color: rgba(26,86,219,0.3); margin-top: 12px; letter-spacing: 0.08em; font-family: 'Rajdhani', sans-serif; }
  </style>
</head>
<body>
<div class="grid-bg"></div>
<div id="root"></div>
<script>
const { useState, useCallback, createElement: h } = React;

const DECAY_RATIOS = {
  特上: [1.000, 0.970, 0.940, 0.920, 0.900],
  良:   [1.000, 0.930, 0.840, 0.760, 0.730],
  並:   [1.000, 0.870, 0.740, 0.640, 0.550],
  悪:   [1.000, 0.780, 0.620, 0.500, 0.350],
};
const EVALUATIONS = ["特上", "良", "並", "悪"];
const WEEKS = ["初週", "2週目", "3週目", "4週目", "5週目"];

const DEFAULT_STORES = [
  { name: "自店",  machines: "491" },
  { name: "競合A", machines: "717" },
  { name: "競合B", machines: "461" },
  { name: "競合C", machines: "410" },
  { name: "競合D", machines: "351" },
  { name: "競合E", machines: "259" },
  { name: "競合F", machines: "370" },
  { name: "競合G", machines: "251" },
];

function n(v) { return parseFloat(v) || 0; }
function fmt(v, d) { return n(v).toFixed(d === undefined ? 2 : d); }

function App() {
  const [prefMachines,      setPrefMachines]      = useState("16926");
  const [peakOccupancy,     setPeakOccupancy]     = useState("38.7");
  const [prefRatio,         setPrefRatio]         = useState("2");
  const [machineName,       setMachineName]       = useState("");
  const [nationalSales,     setNationalSales]     = useState("10000");
  const [selectedEval,      setSelectedEval]      = useState("良");
  const [areaPeakCustomers, setAreaPeakCustomers] = useState("2300");
  const [stores,            setStores]            = useState(DEFAULT_STORES);

  const updateStore = useCallback(function(i, field, val) {
    setStores(function(prev) {
      return prev.map(function(s, idx) {
        return idx === i ? Object.assign({}, s, { [field]: val }) : s;
      });
    });
  }, []);

  function addStore() {
    setStores(function(prev) {
      return prev.concat([{ name: "競合" + String.fromCharCode(64 + prev.length), machines: "200" }]);
    });
  }
  function removeStore(i) {
    if (stores.length > 1) {
      setStores(function(prev) { return prev.filter(function(_, idx) { return idx !== i; }); });
    }
  }

  // Calculations
  const maxPlayers    = n(prefMachines) * (n(peakOccupancy) / 100);
  const prefSales     = n(nationalSales) * (n(prefRatio) / 100);
  const baseOutshare  = maxPlayers > 0 ? (prefSales / maxPlayers) * 100 : 0;

  const outshareByEval = {};
  EVALUATIONS.forEach(function(ev) {
    outshareByEval[ev] = DECAY_RATIOS[ev].map(function(r) { return baseOutshare * r; });
  });

  const totalAreaMachines = stores.reduce(function(s, st) { return s + n(st.machines); }, 0);
  const myShare = totalAreaMachines > 0 ? n(stores[0].machines) / totalAreaMachines : 0;

  const weeklyAreaCustomers = outshareByEval[selectedEval].map(function(os) {
    return n(areaPeakCustomers) * (os / 100);
  });
  const myWeeklyCount = weeklyAreaCustomers.map(function(c) { return c * myShare; });
  const totalAreaCount = weeklyAreaCustomers.slice();

  const totalImported = stores.reduce(function(sum, st) {
    var share = totalAreaMachines > 0 ? n(st.machines) / totalAreaMachines : 0;
    return sum + weeklyAreaCustomers[0] * share;
  }, 0);
  const sufficiencyRate = weeklyAreaCustomers[0] > 0 ? (totalImported / weeklyAreaCustomers[0]) * 100 : 0;

  const isBad  = selectedEval === "悪";
  const isGood = sufficiencyRate <= 100;

  // --- Render helpers ---
  function InputRow(label, value, setter, suffix, step) {
    return h('div', { className: 'input-row' },
      h('label', { className: 'input-label' }, label),
      h('div', { className: 'input-wrap' },
        h('input', {
          className: 'num-input',
          type: 'text',
          inputMode: 'decimal',
          value: value,
          onChange: function(e) { setter(e.target.value); },
          onFocus: function(e) { e.target.select(); },
        }),
        suffix ? h('span', { className: 'suffix' }, suffix) : null
      )
    );
  }

  return h('div', { className: 'wrap' },

    // Header
    h('div', { className: 'header' },
      h('div', { className: 'header-sub' }, 'SLOT UNIT ANALYSIS TOOL / 20円スロット'),
      h('h1', { className: 'header-title' }, '20円スロット', h('span', null, '新台適正導入台数算出ツール'))
    ),

    // 01 県内データ
    h('div', { className: 'section' },
      h('div', { className: 'section-title' }, '01 / 県内データ'),
      InputRow('20円設置台数', prefMachines, setPrefMachines, '台'),
      InputRow('ピーク稼働率', peakOccupancy, setPeakOccupancy, '%'),
      InputRow('県内販売按分率', prefRatio, setPrefRatio, '%'),
      h('div', { className: 'result-box' },
        h('div', { className: 'result-label' }, 'CALCULATED'),
        h('span', null, '県内最大遊技人数：'),
        h('span', { className: 'result-val' }, Math.round(maxPlayers).toLocaleString() + ' 人')
      )
    ),

    // 02 機種データ
    h('div', { className: 'section' },
      h('div', { className: 'section-title' }, '02 / 機種データ'),
      h('div', { className: 'input-row' },
        h('label', { className: 'input-label' }, '機種名　／　全国販売台数'),
        h('div', { className: 'input-wrap' },
          h('input', {
            type: 'text',
            value: machineName,
            onChange: function(e) { setMachineName(e.target.value); },
            placeholder: '機種名を入力',
            style: {
              background: 'rgba(26,86,219,0.04)',
              border: '1px solid rgba(26,86,219,0.2)',
              borderRadius: 2, color: 'var(--text)',
              padding: '6px 12px', fontSize: 14, width: 200,
              fontFamily: 'Noto Sans JP, sans-serif', outline: 'none',
              marginRight: 8,
            }
          }),
          h('input', {
            className: 'num-input',
            type: 'text',
            inputMode: 'decimal',
            value: nationalSales,
            onChange: function(e) { setNationalSales(e.target.value); },
            onFocus: function(e) { e.target.select(); },
            style: { width: 110 }
          }),
          h('span', { className: 'suffix' }, '台')
        )
      ),
      h('div', { className: 'result-box' },
        h('div', { className: 'result-label' }, 'CALCULATED'),
        h('div', { className: 'result-row' },
          h('span', null, '県内販売台数：', h('span', { className: 'result-val' }, Math.round(prefSales).toLocaleString() + ' 台')),
          h('span', null, '基準アウトシェア：', h('span', { className: 'result-val' }, fmt(baseOutshare) + ' %'))
        )
      ),
      h('div', { className: 'sub-label', style: { marginTop: 20 } }, '評価別アウトシェア推移（%）'),
      h('div', { style: { overflowX: 'auto' } },
        h('table', null,
          h('thead', null,
            h('tr', null,
              h('th', { style: { textAlign: 'left' } }, '週'),
              EVALUATIONS.map(function(ev) {
                return h('th', {
                  key: ev,
                  className: selectedEval === ev ? 'active' : '',
                  style: { textAlign: 'center' },
                  onClick: function() { setSelectedEval(ev); },
                }, ev + (selectedEval === ev ? ' ▲' : ''));
              })
            )
          ),
          h('tbody', null,
            WEEKS.map(function(week, wi) {
              return h('tr', { key: week, style: { background: wi % 2 === 0 ? 'rgba(245,200,66,0.02)' : 'transparent' } },
                h('td', { style: { color: 'var(--text-dim)', fontSize: 12 } }, week),
                EVALUATIONS.map(function(ev) {
                  return h('td', {
                    key: ev,
                    className: selectedEval === ev ? 'active-col' : 'inactive-col',
                    style: { textAlign: 'center' },
                  }, fmt(outshareByEval[ev][wi]) + '%');
                })
              );
            })
          )
        )
      ),
      h('div', { className: 'hint' }, '※ 評価名をクリックして選択')
    ),

    // 03 エリアデータ
    h('div', { className: 'section' },
      h('div', { className: 'section-title' }, '03 / エリアデータ'),
      InputRow('エリアピーク客数', areaPeakCustomers, setAreaPeakCustomers, '人'),
      h('div', { className: 'sub-label', style: { margin: '16px 0 10px' } }, 'STORE LIST（1行目 ＝ 自店）'),
      stores.map(function(store, i) {
        var isMyStore = i === 0;
        return h('div', { key: i, className: 'store-row' },
          h('input', {
            type: 'text',
            value: store.name,
            onChange: function(e) { updateStore(i, 'name', e.target.value); },
            className: 'store-name-input' + (isMyStore ? ' mystore' : ''),
          }),
          h('input', {
            type: 'text',
            inputMode: 'numeric',
            value: store.machines,
            onChange: function(e) { updateStore(i, 'machines', e.target.value); },
            onFocus: function(e) { e.target.select(); },
            className: 'store-machines-input',
          }),
          h('span', { className: 'suffix' }, '台'),
          h('span', { className: 'store-share' },
            'シェア ' + (totalAreaMachines > 0 ? fmt(n(store.machines) / totalAreaMachines * 100) : '0.00') + '%'
          ),
          (stores.length > 1 && i !== 0)
            ? h('button', { onClick: function() { removeStore(i); }, className: 'remove-btn' }, '✕')
            : null
        );
      }),
      h('button', { onClick: addStore, className: 'add-btn' }, '＋ 店舗を追加'),
      h('div', { className: 'area-summary' },
        h('span', null, 'エリア合計：', h('strong', { style: { color: 'var(--text)', fontFamily: 'Rajdhani, sans-serif' } }, totalAreaMachines.toLocaleString() + ' 台')),
        h('span', null, '自店シェア：', h('strong', { style: { color: 'var(--amber)', fontFamily: 'Rajdhani, sans-serif' } }, fmt(myShare * 100) + ' %'))
      )
    ),

    // 04 算出結果
    h('div', { className: 'section' },
      h('div', { className: 'section-title' }, '04 / 算出結果'),

      // 評価選択
      h('div', { className: 'eval-row' },
        h('span', { className: 'eval-label' }, 'EVALUATION :'),
        EVALUATIONS.map(function(ev) {
          var cls = 'eval-btn' + (selectedEval === ev ? ' active' : '') + (ev === '悪' ? ' bad' : '');
          return h('button', { key: ev, className: cls, onClick: function() { setSelectedEval(ev); } }, ev);
        })
      ),

      // 自店週別
      h('div', { className: 'sub-label' }, '自店　WEEKLY UNIT COUNT'),
      h('div', { className: 'week-cards' },
        WEEKS.map(function(week, wi) {
          return h('div', { key: week, className: 'week-card ' + (wi === 0 ? 'first' : 'other') },
            h('div', { className: 'week-label', style: { color: wi === 0 ? 'var(--amber)' : 'var(--text-dim)' } }, week),
            h('div', { className: 'week-num' }, Math.round(myWeeklyCount[wi])),
            h('div', { className: 'week-unit' }, '台'),
            h('div', { className: 'week-os' }, 'OS ' + fmt(outshareByEval[selectedEval][wi]) + '%')
          );
        })
      ),

      // 全店舗テーブル
      h('div', { className: 'sub-label' }, '全店舗　AREA UNIT TABLE（' + selectedEval + '）'),
      h('div', { style: { overflowX: 'auto', marginBottom: 24 } },
        h('table', null,
          h('thead', null,
            h('tr', null,
              h('th', { style: { textAlign: 'left' } }, '店舗'),
              h('th', { style: { textAlign: 'right' } }, '台数'),
              h('th', { style: { textAlign: 'right' } }, 'シェア'),
              WEEKS.map(function(w) { return h('th', { key: w, style: { textAlign: 'right' } }, w); })
            )
          ),
          h('tbody', null,
            stores.map(function(store, i) {
              var isMyStore = i === 0;
              var share = totalAreaMachines > 0 ? n(store.machines) / totalAreaMachines : 0;
              var wc = weeklyAreaCustomers.map(function(c) { return Math.round(c * share); });
              return h('tr', { key: i, style: { background: isMyStore ? 'rgba(26,86,219,0.04)' : i % 2 === 0 ? 'rgba(0,0,0,0.01)' : 'transparent' } },
                h('td', { style: { color: isMyStore ? 'var(--amber)' : 'var(--text)', fontWeight: isMyStore ? 700 : 400 } }, store.name),
                h('td', { style: { textAlign: 'right', color: 'var(--text-dim)', fontFamily: 'Rajdhani, sans-serif' } }, n(store.machines).toLocaleString()),
                h('td', { style: { textAlign: 'right', color: 'var(--text-dim)', fontFamily: 'Rajdhani, sans-serif' } }, fmt(share * 100) + '%'),
                wc.map(function(c, wi) {
                  return h('td', { key: wi, style: { textAlign: 'right', fontFamily: 'Rajdhani, sans-serif', color: isMyStore ? 'var(--text)' : 'rgba(0,0,0,0.4)', fontWeight: isMyStore ? 600 : 400 } }, c + '台');
                })
              );
            })
          ),
          h('tfoot', null,
            h('tr', { style: { borderTop: '1px solid rgba(26,86,219,0.1)' } },
              h('td', { colSpan: 3, style: { color: 'var(--text-dim)', fontSize: 11 } }, 'エリア合計'),
              totalAreaCount.map(function(c, wi) {
                return h('td', { key: wi, style: { textAlign: 'right', color: 'rgba(0,0,0,0.3)', fontSize: 11, fontFamily: 'Rajdhani, sans-serif' } }, Math.round(c) + '台');
              })
            )
          )
        )
      ),

      // 導入推奨台数
      h('div', { className: 'sub-label' }, '導入推奨台数　RECOMMENDED UNITS（5週目ベース）'),
      h('div', { className: 'recommend-box ' + (isBad ? 'bad' : 'normal') },
        h('div', { style: { textAlign: 'center' } },
          h('div', { className: 'rec-label', style: { color: isBad ? 'var(--warn)' : 'var(--amber)' } }, '自店 導入推奨台数'),
          h('div', { className: 'big-num', style: { color: isBad ? 'var(--warn)' : 'var(--amber)' } }, Math.round(myWeeklyCount[4])),
          h('div', { className: 'rec-unit', style: { color: isBad ? 'var(--warn)' : 'var(--amber2)' } }, '台'),
          isBad ? h('div', { className: 'badge-warn' }, '⚠ 悪評価のため導入非推奨') : null
        ),
        h('div', { style: { flex: 1, minWidth: 200 } },
          h('div', { className: 'rivals-label' }, '競合店 導入推奨台数'),
          h('div', { className: 'rival-cards' },
            stores.slice(1).map(function(store, i) {
              var share = totalAreaMachines > 0 ? n(store.machines) / totalAreaMachines : 0;
              return h('div', { key: i, className: 'rival-card' },
                h('div', { className: 'rival-name' }, store.name),
                h('div', { className: 'rival-num' }, Math.round(weeklyAreaCustomers[4] * share)),
                h('div', { className: 'rival-unit' }, '台')
              );
            })
          )
        ),
        h('div', { className: 'rec-info' },
          h('div', null,
            h('span', { className: 'rec-info-label' }, '評価　'),
            h('span', { className: 'rec-info-val', style: { color: isBad ? 'var(--warn)' : 'var(--amber)' } }, selectedEval)
          ),
          h('div', null,
            h('span', { className: 'rec-info-label' }, '5週目アウトシェア　'),
            h('span', { className: 'rec-info-val', style: { color: 'var(--text)' } }, fmt(outshareByEval[selectedEval][4]) + '%')
          ),
          h('div', null,
            h('span', { className: 'rec-info-label' }, 'エリア予測客数　'),
            h('span', { className: 'rec-info-val', style: { color: 'var(--text)' } }, fmt(weeklyAreaCustomers[4]) + '人')
          )
        )
      ),

      // 充足率
      h('div', {
        className: 'suf-box',
        style: {
          background: isGood ? 'var(--good-dim)' : 'var(--warn-dim)',
          border: '1px solid ' + (isGood ? 'rgba(0,230,118,0.25)' : 'rgba(255,107,53,0.25)'),
        }
      },
        h('div', null,
          h('div', { className: 'suf-label' }, 'AREA SUFFICIENCY RATE（初週）'),
          h('div', { className: 'suf-num', style: { color: isGood ? 'var(--good)' : 'var(--warn)' } }, fmt(sufficiencyRate) + '%')
        ),
        h('div', { className: 'suf-msg', style: { color: isGood ? 'rgba(0,230,118,0.7)' : 'rgba(255,107,53,0.7)' } },
          isGood ? '✓ 需要あり — 導入余地あります' : '⚠ 需要超過 — エリアが飽和傾向です'
        )
      )
    ),

    // Footer
    h('div', { className: 'footer' },
      'OUTSHARE = PREF SALES ÷ PREF MAX PLAYERS　／　UNIT = AREA PEAK × OUTSHARE × STORE SHARE'
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
