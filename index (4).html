
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>20円スロット新台適正導入台数算出ツール</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <style>
    :root {
      --bg: #060d1a;
      --bg2: #0a1628;
      --bg3: #0e1f38;
      --cyan: #f5c842;
      --cyan2: #d4a820;
      --cyan-dim: rgba(245,200,66,0.12);
      --cyan-border: rgba(245,200,66,0.2);
      --text: #f0ece0;
      --text-dim: #7a7060;
      --accent: #00e5ff;
      --warn: #ff6b35;
      --warn-dim: rgba(255,107,53,0.15);
      --good: #00e676;
      --good-dim: rgba(0,230,118,0.12);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans JP', sans-serif;
      min-height: 100vh;
    }
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background:
        radial-gradient(ellipse at 20% 10%, rgba(30,50,120,0.25) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(80,60,20,0.2) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }
    #root { position: relative; z-index: 1; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { opacity: 1; }
    input:focus { outline: 1px solid var(--cyan) !important; }

    .grid-bg {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image:
        linear-gradient(rgba(245,200,66,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(245,200,66,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .section {
      background: linear-gradient(135deg, rgba(14,31,56,0.9) 0%, rgba(10,22,40,0.9) 100%);
      border: 1px solid var(--cyan-border);
      border-radius: 4px;
      padding: 24px 28px;
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
    }
    .section::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 3px; height: 100%;
      background: linear-gradient(180deg, var(--cyan), transparent);
    }
    .section-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.3em;
      color: var(--cyan);
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .input-row {
      display: flex;
      align-items: center;
      margin-bottom: 12px;
      gap: 12px;
      flex-wrap: wrap;
    }
    .input-label {
      color: var(--text-dim);
      font-size: 12px;
      width: 200px;
      flex-shrink: 0;
      letter-spacing: 0.05em;
    }
    .input-wrap { display: flex; align-items: center; gap: 8px; }
    .num-input {
      background: rgba(245,200,66,0.04);
      border: 1px solid rgba(245,200,66,0.18);
      border-radius: 2px;
      color: var(--text);
      padding: 6px 12px;
      font-size: 14px;
      width: 130px;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 600;
    }
    .num-input:focus { border-color: var(--cyan); background: rgba(245,200,66,0.07); }
    .suffix { color: var(--text-dim); font-size: 12px; }

    .result-box {
      background: rgba(245,200,66,0.05);
      border: 1px solid rgba(245,200,66,0.12);
      border-radius: 2px;
      padding: 12px 16px;
      margin-top: 14px;
      font-size: 13px;
    }
    .result-label {
      color: var(--cyan);
      font-size: 10px;
      letter-spacing: 0.2em;
      margin-bottom: 6px;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
    }

    .eval-btn {
      background: transparent;
      border: 1px solid rgba(245,200,66,0.25);
      border-radius: 2px;
      color: var(--cyan);
      padding: 4px 16px;
      font-size: 12px;
      font-family: 'Noto Sans JP', sans-serif;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.05em;
    }
    .eval-btn.active {
      background: var(--cyan);
      color: #060d1a;
      font-weight: 700;
    }
    .eval-btn.bad {
      border-color: rgba(255,107,53,0.4);
      color: var(--warn);
    }
    .eval-btn.bad.active {
      background: var(--warn);
      color: #fff;
    }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { padding: 8px 12px; font-weight: 400; border-bottom: 1px solid rgba(245,200,66,0.1); color: var(--text-dim); font-size: 11px; letter-spacing: 0.08em; }
    td { padding: 8px 12px; border-bottom: 1px solid rgba(255,255,255,0.04); }

    .week-card {
      flex: 1;
      min-width: 90px;
      border-radius: 3px;
      padding: 14px 12px;
      text-align: center;
    }
    .week-card.first {
      background: rgba(245,200,66,0.07);
      border: 1px solid rgba(245,200,66,0.3);
    }
    .week-card.other {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
    }

    .recommend-box {
      padding: 20px 24px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      gap: 24px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .recommend-box.normal {
      background: rgba(0,229,255,0.06);
      border: 1px solid rgba(245,200,66,0.25);
    }
    .recommend-box.bad {
      background: rgba(255,107,53,0.06);
      border: 1px solid rgba(255,107,53,0.3);
    }

    .big-num {
      font-family: 'Rajdhani', sans-serif;
      font-size: 56px;
      font-weight: 700;
      line-height: 1;
    }

    .badge-warn {
      margin-top: 10px;
      padding: 5px 12px;
      background: rgba(255,107,53,0.15);
      border: 1px solid rgba(255,107,53,0.4);
      border-radius: 2px;
      font-size: 11px;
      color: var(--warn);
      font-weight: 700;
      letter-spacing: 0.05em;
      display: inline-block;
    }

    .suf-rate {
      padding: 16px 20px;
      border-radius: 3px;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .store-row {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 3px;
      padding: 10px 14px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .store-name-input {
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(245,200,66,0.18);
      color: var(--text);
      font-size: 13px;
      width: 90px;
      outline: none;
      padding: 2px 4px;
      font-family: 'Noto Sans JP', sans-serif;
    }
    .store-machines-input {
      background: rgba(245,200,66,0.04);
      border: 1px solid rgba(245,200,66,0.12);
      border-radius: 2px;
      color: var(--text);
      padding: 4px 10px;
      font-size: 13px;
      width: 90px;
      outline: none;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 600;
    }
    .add-btn {
      margin-top: 8px;
      background: transparent;
      border: 1px dashed rgba(245,200,66,0.2);
      border-radius: 2px;
      color: var(--cyan);
      padding: 6px 16px;
      font-size: 11px;
      cursor: pointer;
      letter-spacing: 0.1em;
      font-family: 'Noto Sans JP', sans-serif;
    }
    .remove-btn {
      margin-left: auto;
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.2);
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
    }
    .remove-btn:hover { color: var(--warn); }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <div id="root"></div>
  <script>
    const { useState, useCallback, createElement: h } = React;

    const DECAY_RATIOS = {
      特上: [1.000, 0.970, 0.940, 0.920, 0.900],
      良:   [1.000, 0.930, 0.840, 0.760, 0.730],
      並:   [1.000, 0.870, 0.740, 0.640, 0.550],
      悪:   [1.000, 0.780, 0.620, 0.500, 0.350],
    };

    const EVALUATIONS = ["特上", "良", "並", "悪"];
    const WEEKS = ["初週", "2週目", "3週目", "4週目", "5週目"];

    const defaultStores = [
      { name: "自店", machines: "491" },
      { name: "競合A", machines: "717" },
      { name: "競合B", machines: "461" },
      { name: "競合C", machines: "410" },
      { name: "競合D", machines: "351" },
      { name: "競合E", machines: "259" },
      { name: "競合F", machines: "370" },
      { name: "競合G", machines: "251" },
    ];

    function fmt(n, d) { return Number(n).toFixed(d === undefined ? 2 : d); }

    function App() {
      const [prefMachines, setPrefMachines] = useState("16926");
      const [peakOccupancy, setPeakOccupancy] = useState("38.7");
      const [prefRatio, setPrefRatio] = useState("2");
      const [nationalSales, setNationalSales] = useState("10000");
      const [selectedEval, setSelectedEval] = useState("良");
      const [areaPeakCustomers, setAreaPeakCustomers] = useState("2300");
      const [stores, setStores] = useState(defaultStores);

      const updateStore = useCallback(function(i, field, val) {
        setStores(function(prev) {
          return prev.map(function(s, idx) { return idx === i ? Object.assign({}, s, { [field]: val }) : s; });
        });
      }, []);

      function addStore() {
        setStores(function(prev) {
          return [...prev, { name: "競合" + String.fromCharCode(64 + prev.length), machines: "200" }];
        });
      }
      function removeStore(i) {
        if (stores.length > 1) setStores(function(prev) { return prev.filter(function(_, idx) { return idx !== i; }); });
      }

      const prefSales = Number(nationalSales) * (Number(prefRatio) / 100);
      const maxPlayers = Number(prefMachines) * (Number(peakOccupancy) / 100);
      const baseOutshare = maxPlayers > 0 ? (prefSales / maxPlayers) * 100 : 0;

      const outshareByEval = {};
      EVALUATIONS.forEach(function(ev) {
        outshareByEval[ev] = DECAY_RATIOS[ev].map(function(r) { return baseOutshare * r; });
      });

      const totalAreaMachines = stores.reduce(function(s, st) { return s + (Number(st.machines) || 0); }, 0);
      const myStore = stores[0];
      const myShare = totalAreaMachines > 0 ? Number(myStore.machines) / totalAreaMachines : 0;

      const weeklyAreaCustomers = outshareByEval[selectedEval].map(function(os) { return Number(areaPeakCustomers) * (os / 100); });
      const myWeeklyCount = weeklyAreaCustomers.map(function(c) { return Math.round(c * myShare * 10) / 10; });
      const totalAreaCount = weeklyAreaCustomers.map(function(c) { return Math.round(c * 10) / 10; });

      const totalImported = stores.reduce(function(sum, st) {
        const share = totalAreaMachines > 0 ? Number(st.machines) / totalAreaMachines : 0;
        return sum + Math.round(weeklyAreaCustomers[0] * share * 10) / 10;
      }, 0);
      const sufficiencyRate = weeklyAreaCustomers[0] > 0 ? (totalImported / weeklyAreaCustomers[0]) * 100 : 0;
      const isBad = selectedEval === "悪";
      const isGood = sufficiencyRate <= 100;

      function InputRow(props) {
        return h('div', { className: 'input-row' },
          h('label', { className: 'input-label' }, props.label),
          h('div', { className: 'input-wrap' },
            h('input', {
              type: 'text',
              inputMode: 'decimal',
              key: props.defaultVal,
              defaultValue: props.value,
              onBlur: function(e) { props.onChange(e.target.value); },
              onFocus: function(e) { e.target.select(); },
              className: 'num-input',
            }),
            props.suffix ? h('span', { className: 'suffix' }, props.suffix) : null
          )
        );
      }

      return h('div', {
        style: { maxWidth: 920, margin: '0 auto', padding: '36px 24px 48px' }
      },

        // ヘッダー
        h('div', { style: { marginBottom: 40, borderBottom: '1px solid rgba(245,200,66,0.1)', paddingBottom: 24 } },
          h('div', {
            style: { fontFamily: 'Rajdhani, sans-serif', fontSize: 10, letterSpacing: '0.4em', color: 'rgba(245,200,66,0.4)', marginBottom: 10 }
          }, 'SLOT UNIT ANALYSIS TOOL / 20円スロット'),
          h('h1', {
            style: { fontFamily: 'Rajdhani, sans-serif', fontSize: 28, fontWeight: 700, color: '#f0ece0', letterSpacing: '0.05em' }
          }, '20円スロット', h('span', { style: { color: 'var(--cyan)', marginLeft: 12 } }, '新台適正導入台数算出ツール'))
        ),

        // 01 県内データ
        h('div', { className: 'section' },
          h('div', { className: 'section-title' }, '01 / 県内データ'),
          h(InputRow, { label: '20円設置台数', value: prefMachines, onChange: function(v) { setPrefMachines(v); }, suffix: '台' }),
          h(InputRow, { label: 'ピーク稼働率', value: peakOccupancy, onChange: function(v) { setPeakOccupancy(v); }, suffix: '%', step: '0.1' }),
          h(InputRow, { label: '県内販売按分率', value: prefRatio, onChange: function(v) { setPrefRatio(v); }, suffix: '%', step: '0.1' }),
          h('div', { className: 'result-box' },
            h('div', { className: 'result-label' }, 'CALCULATED'),
            h('span', { style: { fontSize: 13 } }, '県内最大遊技人数：'),
            h('strong', { style: { color: '#f0ece0', fontFamily: 'Rajdhani, sans-serif', fontSize: 15 } }, Math.round(maxPlayers).toLocaleString() + ' 人')
          )
        ),

        // 02 機種データ
        h('div', { className: 'section' },
          h('div', { className: 'section-title' }, '02 / 機種データ'),
          h(InputRow, { label: '全国販売台数', value: nationalSales, onChange: function(v) { setNationalSales(v); }, suffix: '台' }),
          h('div', { className: 'result-box' },
            h('div', { className: 'result-label' }, 'CALCULATED'),
            h('div', { style: { display: 'flex', gap: 32, flexWrap: 'wrap', fontSize: 13 } },
              h('span', null, '県内販売台数：', h('strong', { style: { color: '#f0ece0', fontFamily: 'Rajdhani, sans-serif', fontSize: 15 } }, Math.round(prefSales).toLocaleString() + ' 台')),
              h('span', null, '基準アウトシェア：', h('strong', { style: { color: '#f0ece0', fontFamily: 'Rajdhani, sans-serif', fontSize: 15 } }, fmt(baseOutshare) + ' %'))
            )
          ),
          h('div', { style: { fontSize: 10, letterSpacing: '0.1em', color: 'var(--text-dim)', margin: '20px 0 10px', fontFamily: 'Rajdhani, sans-serif' } }, 'OUTSHARE BY EVALUATION (%)'),
          h('div', { style: { overflowX: 'auto' } },
            h('table', null,
              h('thead', null,
                h('tr', null,
                  h('th', { style: { textAlign: 'left' } }, '週'),
                  EVALUATIONS.map(function(ev) {
                    return h('th', {
                      key: ev,
                      onClick: function() { setSelectedEval(ev); },
                      style: {
                        textAlign: 'center', cursor: 'pointer',
                        color: selectedEval === ev ? 'var(--cyan)' : 'var(--text-dim)',
                        fontWeight: selectedEval === ev ? 700 : 400,
                      }
                    }, ev + (selectedEval === ev ? ' ▲' : ''));
                  })
                )
              ),
              h('tbody', null,
                WEEKS.map(function(week, wi) {
                  return h('tr', { key: week, style: { background: wi % 2 === 0 ? 'rgba(0,229,255,0.02)' : 'transparent' } },
                    h('td', { style: { color: 'var(--text-dim)', fontSize: 12 } }, week),
                    EVALUATIONS.map(function(ev) {
                      return h('td', {
                        key: ev,
                        style: {
                          textAlign: 'center', fontFamily: 'Rajdhani, sans-serif',
                          color: selectedEval === ev ? '#f0ece0' : 'rgba(255,255,255,0.25)',
                          fontWeight: selectedEval === ev ? 600 : 400,
                          fontSize: selectedEval === ev ? 14 : 13,
                          background: selectedEval === ev ? 'rgba(245,200,66,0.04)' : 'transparent',
                        }
                      }, fmt(outshareByEval[ev][wi]) + '%');
                    })
                  );
                })
              )
            )
          ),
          h('div', { style: { fontSize: 10, color: 'var(--text-dim)', marginTop: 6 } }, '※ 評価名をクリックして切替')
        ),

        // 03 エリアデータ
        h('div', { className: 'section' },
          h('div', { className: 'section-title' }, '03 / エリアデータ'),
          h(InputRow, { label: 'エリアピーク客数', value: areaPeakCustomers, onChange: function(v) { setAreaPeakCustomers(v); }, suffix: '人' }),
          h('div', { style: { fontSize: 10, letterSpacing: '0.1em', color: 'var(--text-dim)', margin: '16px 0 10px', fontFamily: 'Rajdhani, sans-serif' } }, 'STORE LIST  （1行目 ＝ 自店）'),
          stores.map(function(store, i) {
            var isMyStore = i === 0;
            return h('div', { key: i, className: 'store-row' },
              h('input', {
                value: store.name,
                onChange: function(e) { updateStore(i, 'name', e.target.value); },
                className: 'store-name-input',
                style: { color: isMyStore ? 'var(--cyan)' : 'var(--text)', fontWeight: isMyStore ? 700 : 400 },
              }),
              h('input', {
                type: 'text',
                inputMode: 'numeric',
                key: 'store-' + i + '-' + store.machines,
                defaultValue: store.machines,
                onBlur: function(e) { updateStore(i, 'machines', e.target.value); },
                onFocus: function(e) { e.target.select(); },
                className: 'store-machines-input',
              }),
              h('span', { className: 'suffix' }, '台'),
              h('span', { style: { color: 'var(--text-dim)', fontSize: 11, marginLeft: 8 } },
                'シェア ' + (totalAreaMachines > 0 ? fmt(Number(store.machines) / totalAreaMachines * 100) : '0.00') + '%'
              ),
              (stores.length > 1 && i !== 0)
                ? h('button', { onClick: function() { removeStore(i); }, className: 'remove-btn' }, '✕')
                : null
            );
          }),
          h('button', { onClick: addStore, className: 'add-btn' }, '＋ 店舗を追加'),
          h('div', {
            style: { marginTop: 14, padding: '10px 14px', background: 'rgba(245,200,66,0.03)', borderRadius: 2, fontSize: 12, color: 'var(--text-dim)', display: 'flex', gap: 24 }
          },
            h('span', null, 'エリア合計：', h('strong', { style: { color: '#f0ece0', fontFamily: 'Rajdhani, sans-serif' } }, totalAreaMachines.toLocaleString() + ' 台')),
            h('span', null, '自店シェア：', h('strong', { style: { color: 'var(--cyan)', fontFamily: 'Rajdhani, sans-serif' } }, fmt(myShare * 100) + ' %'))
          )
        ),

        // 04 算出結果
        h('div', { className: 'section' },
          h('div', { className: 'section-title' }, '04 / 算出結果'),

          // 評価選択
          h('div', { style: { display: 'flex', gap: 10, marginBottom: 22, flexWrap: 'wrap', alignItems: 'center' } },
            h('span', { style: { fontSize: 11, color: 'var(--text-dim)', letterSpacing: '0.1em' } }, 'EVALUATION :'),
            EVALUATIONS.map(function(ev) {
              return h('button', {
                key: ev,
                onClick: function() { setSelectedEval(ev); },
                className: 'eval-btn' + (selectedEval === ev ? ' active' : '') + (ev === '悪' ? ' bad' : ''),
              }, ev);
            })
          ),

          // 自店週別
          h('div', { style: { fontSize: 10, letterSpacing: '0.15em', color: 'var(--text-dim)', marginBottom: 10, fontFamily: 'Rajdhani, sans-serif' } }, '自店　WEEKLY UNIT COUNT'),
          h('div', { style: { display: 'flex', gap: 10, marginBottom: 24, flexWrap: 'wrap' } },
            WEEKS.map(function(week, wi) {
              return h('div', { key: week, className: 'week-card ' + (wi === 0 ? 'first' : 'other') },
                h('div', { style: { fontSize: 10, color: wi === 0 ? 'var(--cyan)' : 'var(--text-dim)', marginBottom: 8, letterSpacing: '0.08em' } }, week),
                h('div', { style: { fontFamily: 'Rajdhani, sans-serif', fontSize: 30, fontWeight: 700, color: '#f0ece0', lineHeight: 1 } }, Math.round(myWeeklyCount[wi])),
                h('div', { style: { fontSize: 10, color: 'rgba(255,255,255,0.2)', marginTop: 4 } }, '台'),
                h('div', { style: { fontSize: 9, color: 'rgba(245,200,66,0.35)', marginTop: 6, fontFamily: 'Rajdhani, sans-serif' } }, 'OS ' + fmt(outshareByEval[selectedEval][wi]) + '%')
              );
            })
          ),

          // 全店舗テーブル
          h('div', { style: { fontSize: 10, letterSpacing: '0.15em', color: 'var(--text-dim)', marginBottom: 10, fontFamily: 'Rajdhani, sans-serif' } }, '全店舗　AREA UNIT TABLE　（' + selectedEval + '）'),
          h('div', { style: { overflowX: 'auto', marginBottom: 24 } },
            h('table', null,
              h('thead', null,
                h('tr', null,
                  h('th', { style: { textAlign: 'left' } }, '店舗'),
                  h('th', { style: { textAlign: 'right' } }, '台数'),
                  h('th', { style: { textAlign: 'right' } }, 'シェア'),
                  WEEKS.map(function(w) { return h('th', { key: w, style: { textAlign: 'right' } }, w); })
                )
              ),
              h('tbody', null,
                stores.map(function(store, i) {
                  var isMyStore = i === 0;
                  var share = totalAreaMachines > 0 ? Number(store.machines) / totalAreaMachines : 0;
                  var weekCounts = weeklyAreaCustomers.map(function(c) { return Math.round(c * share * 10) / 10; });
                  return h('tr', { key: i, style: { background: isMyStore ? 'rgba(245,200,66,0.04)' : i % 2 === 0 ? 'rgba(255,255,255,0.01)' : 'transparent' } },
                    h('td', { style: { color: isMyStore ? 'var(--cyan)' : 'var(--text)', fontWeight: isMyStore ? 700 : 400 } }, store.name),
                    h('td', { style: { textAlign: 'right', color: 'var(--text-dim)', fontFamily: 'Rajdhani, sans-serif' } }, Number(store.machines).toLocaleString()),
                    h('td', { style: { textAlign: 'right', color: 'var(--text-dim)', fontFamily: 'Rajdhani, sans-serif' } }, fmt(share * 100) + '%'),
                    weekCounts.map(function(c, wi) {
                      return h('td', { key: wi, style: { textAlign: 'right', color: isMyStore ? '#f0ece0' : 'rgba(255,255,255,0.35)', fontFamily: 'Rajdhani, sans-serif', fontWeight: isMyStore ? 600 : 400 } },
                        Math.round(c) + '台'
                      );
                    })
                  );
                })
              ),
              h('tfoot', null,
                h('tr', { style: { borderTop: '1px solid rgba(245,200,66,0.1)' } },
                  h('td', { colSpan: 3, style: { color: 'var(--text-dim)', fontSize: 11 } }, 'エリア合計'),
                  totalAreaCount.map(function(c, wi) {
                    return h('td', { key: wi, style: { textAlign: 'right', color: 'rgba(255,255,255,0.25)', fontSize: 11, fontFamily: 'Rajdhani, sans-serif' } }, Math.round(c) + '台');
                  })
                )
              )
            )
          ),

          // 導入推奨台数
          h('div', { style: { fontSize: 10, letterSpacing: '0.15em', color: 'var(--text-dim)', marginBottom: 10, fontFamily: 'Rajdhani, sans-serif' } }, '導入推奨台数　RECOMMENDED UNITS（5週目ベース）'),
          h('div', { className: 'recommend-box ' + (isBad ? 'bad' : 'normal') },
            h('div', { style: { textAlign: 'center' } },
              h('div', { style: { fontSize: 10, letterSpacing: '0.15em', color: isBad ? 'var(--warn)' : 'var(--cyan)', marginBottom: 6 } }, '自店 導入推奨台数'),
              h('div', { className: 'big-num', style: { color: isBad ? 'var(--warn)' : 'var(--cyan)' } }, Math.round(myWeeklyCount[4])),
              h('div', { style: { fontSize: 12, color: isBad ? 'var(--warn)' : 'var(--cyan2)', marginTop: 4 } }, '台'),
              isBad ? h('div', { className: 'badge-warn' }, '⚠ 悪評価のため導入非推奨') : null
            ),
            h('div', { style: { flex: 1, minWidth: 200 } },
              h('div', { style: { fontSize: 10, color: 'var(--text-dim)', marginBottom: 10, letterSpacing: '0.08em' } }, '競合店 導入推奨台数'),
              h('div', { style: { display: 'flex', flexWrap: 'wrap', gap: 8 } },
                stores.slice(1).map(function(store, i) {
                  var share = totalAreaMachines > 0 ? Number(store.machines) / totalAreaMachines : 0;
                  var count = Math.round(weeklyAreaCustomers[4] * share);
                  return h('div', {
                    key: i,
                    style: { background: 'rgba(255,255,255,0.03)', border: '1px solid rgba(255,255,255,0.08)', borderRadius: 2, padding: '8px 14px', textAlign: 'center', minWidth: 70 }
                  },
                    h('div', { style: { fontSize: 10, color: 'var(--text-dim)', marginBottom: 4 } }, store.name),
                    h('div', { style: { fontFamily: 'Rajdhani, sans-serif', fontSize: 22, fontWeight: 600, color: '#f0ece0' } }, count),
                    h('div', { style: { fontSize: 9, color: 'rgba(255,255,255,0.2)' } }, '台')
                  );
                })
              )
            ),
            h('div', { style: { padding: '12px 16px', background: 'rgba(0,0,0,0.25)', borderRadius: 2, fontSize: 11, color: 'var(--text-dim)', lineHeight: 2, fontFamily: 'Rajdhani, sans-serif' } },
              h('div', null, 'EVAL : ', h('strong', { style: { color: isBad ? 'var(--warn)' : 'var(--cyan)', fontFamily: 'Noto Sans JP, sans-serif', fontSize: 13 } }, selectedEval)),
              h('div', null, '5W OS : ', h('strong', { style: { color: '#f0ece0' } }, fmt(outshareByEval[selectedEval][4]) + '%')),
              h('div', null, 'AREA C : ', h('strong', { style: { color: '#f0ece0' } }, fmt(weeklyAreaCustomers[4]) + '人'))
            )
          ),

          // 充足率
          h('div', {
            className: 'suf-rate',
            style: {
              background: isGood ? 'var(--good-dim)' : 'var(--warn-dim)',
              border: '1px solid ' + (isGood ? 'rgba(0,230,118,0.25)' : 'rgba(255,107,53,0.25)'),
            }
          },
            h('div', null,
              h('div', { style: { fontSize: 10, color: 'var(--text-dim)', marginBottom: 4, fontFamily: 'Rajdhani, sans-serif', letterSpacing: '0.1em' } }, 'AREA SUFFICIENCY RATE（初週）'),
              h('div', { style: { fontFamily: 'Rajdhani, sans-serif', fontSize: 34, fontWeight: 700, color: isGood ? 'var(--good)' : 'var(--warn)' } }, fmt(sufficiencyRate) + '%')
            ),
            h('div', { style: { fontSize: 12, color: isGood ? 'rgba(0,230,118,0.7)' : 'rgba(255,107,53,0.7)' } },
              isGood ? '✓ 需要あり — 導入余地あります' : '⚠ 需要超過 — エリアが飽和傾向です'
            )
          )
        ),

        // フッター
        h('div', { style: { textAlign: 'center', fontSize: 10, color: 'rgba(245,200,66,0.18)', marginTop: 12, letterSpacing: '0.08em', fontFamily: 'Rajdhani, sans-serif' } },
          'OUTSHARE = PREF SALES ÷ PREF MAX PLAYERS　／　UNIT = AREA PEAK × OUTSHARE × STORE SHARE'
        )
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
